x-app-base: &app-base
  build:
    context: .
    dockerfile: ./Dockerfile.dev
  image: virtual-facility-app:dev

services:
  workflows-service:
    <<: *app-base
    command: sh -c "corepack enable && yarn run start:dev -- workflows-service"
    environment: # Here we specify the environment variables that will be passed to the container
      - NODE_ENV=development
      - POSTGRES_HOST=workflows-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=workflows
      - NATS_SERVER_HOST=nats-server
    volumes:
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./yarn.lock:/usr/src/app/yarn.lock
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./nest-cli.json:/usr/src/app/nest-cli.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/workflows-service:/usr/src/app/apps/workflows-service
    depends_on: # This instructs Docker Compose to start the "workflows-db" container before starting the "workflows-service" container
      - workflows-db
      - nats-server
    deploy:
      replicas: 3 # This instructs Docker Compose to run 3 instances of the "workflows-service" container
  workflows-db:
    image: postgres:18-alpine
    environment: # We need to make sure these environment variables match the ones we specified in the "workflows-service" service
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=workflows
  virtual-facility:
    <<: *app-base
    command: sh -c "corepack enable && yarn run start:dev -- virtual-facility"
    ports:
      - 3000:3000 # This instructs Docker Compose to map port 3000 on the host to port 3000 on the container
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=virtual-facility-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=virtual-facility
      - NATS_SERVER_HOST=nats-server
    volumes:
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./yarn.lock:/usr/src/app/yarn.lock
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./nest-cli.json:/usr/src/app/nest-cli.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/virtual-facility:/usr/src/app/apps/virtual-facility
    depends_on:
      - virtual-facility-db
      - workflows-service
      - nats-server
  virtual-facility-db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=virtual-facility
  nats-server:
    image: nats:latest
    ports:
      - 4222:4222
  alarms-service:
    <<: *app-base
    command: sh -c "corepack enable && yarn run start:dev -- alarms-service"
    environment:
      - NODE_ENV=development
      - NATS_SERVER_HOST=nats-server
    volumes:
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./yarn.lock:/usr/src/app/yarn.lock
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./nest-cli.json:/usr/src/app/nest-cli.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/alarms-service:/usr/src/app/apps/alarms-service
    depends_on:
      - nats-server
  alarms-generator:
    <<: *app-base
    command: sh -c "corepack enable && yarn run start:dev -- alarms-generator"
    environment:
      - NODE_ENV=development
      - NATS_SERVER_HOST=nats-server
    volumes:
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./yarn.lock:/usr/src/app/yarn.lock
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./nest-cli.json:/usr/src/app/nest-cli.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/alarms-generator:/usr/src/app/apps/alarms-generator
    depends_on:
      - nats-server
  alarms-classifier-service:
    <<: *app-base
    command: sh -c "corepack enable && yarn run start:dev -- alarms-classifier-service"
    environment:
      - NATS_SERVER_HOST=nats-server
    volumes:
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./yarn.lock:/usr/src/app/yarn.lock
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./nest-cli.json:/usr/src/app/nest-cli.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/alarms-classifier-service:/usr/src/app/apps/alarms-classifier-service
    depends_on:
      - nats-server
  notifications-service:
    <<: *app-base
    command: sh -c "corepack enable && yarn run start:dev -- notifications-service"
    environment:
      - NATS_SERVER_HOST=nats-server
    volumes:
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./yarn.lock:/usr/src/app/yarn.lock
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./nest-cli.json:/usr/src/app/nest-cli.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/notifications-service:/usr/src/app/apps/notifications-service
    depends_on:
      - nats-server
